<body>
    <div id="particles"></div>
    
    <div id="homeBtn" onclick="goHome()">
        <button>HOME</button>
    </div>
    
    <div class="container" id="mainContainer">
        <h1>GREEN SHADOW PROXY</h1>
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. https://example.com)">
        <button onclick="navigate()">GO</button>
    </div>
    
    <iframe id="proxyFrame"></iframe>
    
    <script>
        const uv = new Ultraviolet('https://217.76.245.80/uv/');
        const particles = [];
        const particleCount = 100;
        
        // Create particles
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            document.getElementById('particles').appendChild(particle);
            particles.push({
                element: particle,
                x: parseFloat(particle.style.left),
                y: parseFloat(particle.style.top),
                vx: Math.random() * 2 - 1,
                vy: Math.random() * 2 - 1
            });
        }
        
        // Particle animation
        function updateParticles() {
            const mouseX = mousePos.x;
            const mouseY = mousePos.y;
            
            particles.forEach(p => {
                // Move particle
                p.x += p.vx * 0.1;
                p.y += p.vy * 0.1;
                
                // Mouse repulsion
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    p.vx += (dx / dist) * force * 0.2;
                    p.vy += (dy / dist) * force * 0.2;
                }
                
                // Boundary check
                if (p.x < 0 || p.x > 100) p.vx *= -1;
                if (p.y < 0 || p.y > 100) p.vy *= -1;
                
                // Update position
                p.element.style.left = `${p.x}%`;
                p.element.style.top = `${p.y}%`;
            });
            
            // Connect particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 10) {
                        const line = document.createElement('div');
                        line.style.position = 'absolute';
                        line.style.width = `${dist}%`;
                        line.style.height = '1px';
                        line.style.background = `rgba(0, 255, 0, ${1 - dist/10})`;
                        line.style.top = `${p1.y}%`;
                        line.style.left = `${p1.x}%`;
                        line.style.transformOrigin = '0 0';
                        line.style.transform = `rotate(${Math.atan2(dy, dx)}rad)`;
                        document.getElementById('particles').appendChild(line);
                        
                        setTimeout(() => {
                            line.remove();
                        }, 100);
                    }
                }
            }
            
            requestAnimationFrame(updateParticles);
        }
        
        // Mouse tracking
        const mousePos = { x: 0, y: 0 };
        document.addEventListener('mousemove', (e) => {
            mousePos.x = (e.clientX / window.innerWidth) * 100;
            mousePos.y = (e.clientY / window.innerHeight) * 100;
        });
        
        // Start animation
        updateParticles();
        
        // Navigation functions
        function navigate() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            
            if (!url) return;
            
            if (url.includes(' ')) {
                window.open(`https://duckduckgo.com/?q=${encodeURIComponent(url)}`, '_blank');
                return;
            }
            
            try {
                const proxyUrl = uv.navigate(url);
                document.getElementById('mainContainer').style.transform = 'translateY(-100vh)';
                document.getElementById('proxyFrame').style.display = 'block';
                document.getElementById('proxyFrame').src = proxyUrl;
                document.getElementById('homeBtn').style.display = 'block';
            } catch (e) {
                alert('Invalid URL: ' + e.message);
            }
        }
        
        function goHome() {
            document.getElementById('mainContainer').style.transform = 'translateY(0)';
            document.getElementById('proxyFrame').style.display = 'none';
            document.getElementById('homeBtn').style.display = 'none';
            document.getElementById('proxyFrame').src = '';
        }
        
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                navigate();
            }
        });
    </script>
