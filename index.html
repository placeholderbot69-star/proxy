        body {

            color: #fff;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;

        .desktop {
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-gap: 20px;
            padding: 20px;
            z-index: 1;
            position: relative;
        }
        
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .app-icon:hover {
            transform: scale(1.1);
        }
        
        .app-icon img {
            width: 60px;
            height: 60px;
            margin-bottom: 5px;
        }
        
        .app-icon span {
            font-size: 12px;
            color: #fff;
        }
        
        .app-window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background-color: #1a1a1a;
            border: 2px solid #ff3333;
            border-radius: 5px;
            z-index: 10;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        
        .window-header {
            background-color: #ff3333;
            color: white;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .window-title {

        }
        
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .window-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            background-color: #1a1a1a;
            overflow: auto;
        }
        
        .proxy-ui {
            display: flex;
            margin-bottom: 10px;
        }
        
        .proxy-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #444;
            background-color: #222;
            color: white;
        }
        
        .proxy-go {
            padding: 8px 15px;
            background-color: #ff3333;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        .proxy-go:hover {
            background-color: #ff5555;
        }
        
        .proxy-back {
            margin-bottom: 10px;
            padding: 5px 10px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        .settings-container {
            padding: 10px;
        }
        
        .settings-option {
            margin-bottom: 15px;
        }
        
        .settings-option label {
            display: block;
            margin-bottom: 5px;
        }
        
        .settings-option input {
            width: 100%;
            padding: 5px;
            background-color: #333;
            border: 1px solid #444;
            color: white;
        }
        
        .settings-save {
            padding: 8px 15px;
            background-color: #ff3333;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize particles.js
            particlesJS('particles-js', {
                "particles": {

                    },
                    "opacity": {
                        "value": 0.5,
                        "random": false,
                        "anim": {
                            "enable": false,
                            "speed": 1,
                            "opacity_min": 0.1,
                            "sync": false
                        }
                    },
                    "size": {
                        "value": 3,
                        "random": true,
                        "anim": {
                            "enable": false,
                            "speed": 40,
                            "size_min": 0.1,
                            "sync": false
                        }
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#ff3333",
                        "opacity": 0.4,
                        "width": 1
                    },
                    "move": {
                        "enable": true,
                        "speed": 2,
                        "direction": "none",
                        "random": false,
                        "straight": false,
                        "out_mode": "out",
                        "bounce": false,
                        "attract": {
                            "enable": false,
                            "rotateX": 600,
                            "rotateY": 1200
                        }
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "repulse"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        },
                        "resize": true
                    },
                    "modes": {
                        "grab": {
                            "distance": 400,
                            "line_linked": {
                                "opacity": 1
                            }
                        },
                        "bubble": {
                            "distance": 400,
                            "size": 40,
                            "duration": 2,
                            "opacity": 8,
                            "speed": 3
                        },
                        "repulse": {
                            "distance": 200,
                            "duration": 0.4
                        },
                        "push": {
                            "particles_nb": 4
                        },
                        "remove": {
                            "particles_nb": 2
                        }
                    }
                },
                "retina_detect": true
            });
            
            // App icon click handlers
            document.querySelectorAll('.app-icon').forEach(icon => {
                icon.addEventListener('click', function() {
                    const app = this.getAttribute('data-app');
                    const window = document.getElementById(`${app}-window`);
                    
                    // Hide all windows first
                    document.querySelectorAll('.app-window').forEach(w => {
                        w.style.display = 'none';
                    });
                    
                    // Show the selected window
                    window.style.display = 'flex';
                    
                    // Load content if needed
                    if (app === 'games') {
                        document.getElementById('games-frame').src = `https://159.203.181.211:9191/service/ultraviolet/__uv.html#${encodeURIComponent('https://gnmath.global.ssl.fastly.net/')}`;
                    } else if (app === 'movies') {
                        document.getElementById('movies-frame').src = `https://159.203.181.211:9191/service/ultraviolet/__uv.html#${encodeURIComponent('https://toustream.movietrunk.com/')}`;
                    } else if (app === 'proxy') {
                        document.getElementById('proxy-start').style.display = 'block';
                        document.getElementById('proxy-content').style.display = 'none';
                    }
                });
            });
            
            // Close button handlers
            document.querySelectorAll('.close-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.closest('.app-window').style.display = 'none';
                });
            });
            
            // Proxy functionality
            document.querySelector('.proxy-go').addEventListener('click', function() {
                const url = document.querySelector('.proxy-input').value;
                if (url) {
                    document.getElementById('proxy-start').style.display = 'none';
                    document.getElementById('proxy-content').style.display = 'flex';
                    document.getElementById('proxy-frame').src = `https://159.203.181.211:9191/service/ultraviolet/__uv.html#${encodeURIComponent(url)}`;
                }
            });
            
            document.querySelector('.proxy-back').addEventListener('click', function() {
                document.getElementById('proxy-start').style.display = 'block';
                document.getElementById('proxy-content').style.display = 'none';
            });
            
            // Settings functionality
            document.querySelector('.settings-save').addEventListener('click', function() {
                const themeColor = document.getElementById('theme-color').value;
                const bgColor = document.getElementById('bg-color').value;
                const particleColor = document.getElementById('particle-color').value;
                
                // Apply theme changes
                document.querySelectorAll('.window-header, .proxy-go, .settings-save').forEach(el => {
                    el.style.backgroundColor = themeColor;
                });
                
                document.querySelectorAll('.app-window').forEach(el => {
                    el.style.borderColor = themeColor;
                });
                
                document.body.style.backgroundColor = bgColor;
                
                // Update particle colors
                if (window.pJSDom && window.pJSDom.length > 0) {
                    const pJS = window.pJSDom[0].pJS;
                    pJS.particles.color.value = particleColor;
                    pJS.particles.line_linked.color = particleColor;
                    pJS.fn.particlesRefresh();
                }
            });
        });
    </script>
